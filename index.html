<style>
:root {
  --bg:#060608;--card:#101014;--card2:#18181e;--bdr:#1e1e28;
  --tx:#eaeaf0;--tx2:#8585a0;--tx3:#4a4a60;
  --red:#ff3b5c;--green:#00d47e;--blue:#4488ff;--orange:#ff8833;--purple:#a855f7;--gold:#fbbf24;
  --r:18px;--rs:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--tx);
  min-height:100dvh;max-width:430px;margin:0 auto;
  padding:0 16px;
  padding-top:max(16px,env(safe-area-inset-top));
  padding-bottom:max(100px,env(safe-area-inset-bottom));
  overflow-x:hidden;
}
button,input,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{display:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{display:none}

/* ─── HEADER ─── */
.hdr{padding:20px 0 8px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.hdr-title span{color:var(--tx3);font-weight:500;font-size:14px;margin-left:4px}
.hdr-phase{
  display:flex;gap:4px;background:var(--card);border-radius:10px;padding:3px;
}
.ph-btn{
  padding:7px 14px;border:none;border-radius:8px;font-size:11px;font-weight:700;
  cursor:pointer;background:transparent;color:var(--tx3);transition:all .2s;
}
.ph-btn.on{background:var(--blue);color:#fff}

/* ─── GREETING ─── */
.greet{padding:16px 0 20px}
.greet-hi{font-size:14px;color:var(--tx2);font-weight:500}
.greet-msg{font-size:18px;font-weight:700;margin-top:2px}

/* ─── DAY TILES ─── */
.tiles{display:flex;flex-direction:column;gap:10px}
.tile{
  background:var(--card);border-radius:var(--r);padding:20px;
  cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
  border:1.5px solid var(--bdr);
}
.tile:active{transform:scale(0.98)}
.tile-top{display:flex;align-items:center;gap:14px}
.tile-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.tile-info{flex:1;min-width:0}
.tile-day{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.6}
.tile-name{font-size:18px;font-weight:800;margin-top:2px;line-height:1.2}
.tile-muscles{font-size:12px;color:var(--tx2);margin-top:3px;font-weight:500}
.tile-arrow{
  width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--tx2);flex-shrink:0;
}
.tile-done-bar{
  position:absolute;bottom:0;left:0;height:3px;border-radius:0 2px 0 0;
  transition:width .3s;
}
.tile-badge{
  position:absolute;top:14px;right:14px;
  padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;
  display:none;
}
.tile-badge.show{display:block}

/* ─── WORKOUT VIEW ─── */
.workout{display:none}
.workout.active{display:block}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--tx2);
  font-size:13px;font-weight:600;cursor:pointer;
  padding:14px 0;
}
.back-btn:active{opacity:.6}

/* ─── MUSCLE CARD ─── */
.muscle-card{
  background:var(--card);border-radius:var(--r);padding:20px;
  margin-bottom:12px;overflow:hidden;
}
.muscle-card-head{
  display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;
}
.mc-left{flex:1}
.mc-day{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;opacity:.5}
.mc-title{font-size:24px;font-weight:900;margin-top:4px;line-height:1.1}
.mc-sub{font-size:12px;color:var(--tx2);margin-top:4px;font-weight:500}
.mc-body-wrap{
  display:flex;justify-content:center;gap:8px;
  margin-bottom:16px;
}
.mc-body-wrap svg{width:90px;height:200px}
.muscle-list{display:flex;gap:20px}
.muscle-col h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:6px}
.muscle-col li{list-style:none;font-size:12px;font-weight:600;line-height:1.8;display:flex;align-items:center;gap:6px}
.muscle-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ─── DATE BAR ─── */
.date-bar{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.date-bar input[type=date]{
  background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);
  color:var(--tx);padding:8px 12px;font-size:13px;font-weight:600;
  font-family:'JetBrains Mono',monospace;
}
.date-bar input::-webkit-calendar-picker-indicator{filter:invert(.7)}
.d-nav{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);
  background:var(--card);color:var(--tx2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.d-label{font-size:12px;color:var(--tx3);font-weight:500;margin-left:auto}

/* ─── EXERCISE CARDS ─── */
.ex-card{
  background:var(--card);border-radius:var(--r);margin-bottom:8px;
  overflow:hidden;border:1.5px solid transparent;transition:all .2s;
}
.ex-card.done{opacity:.4}
.ex-card.open{border-color:var(--bdr)}
.ex-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.ex-num{
  width:28px;height:28px;border-radius:8px;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ex-mid{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:700;line-height:1.3}
.ex-card.done .ex-name{text-decoration:line-through;opacity:.6}
.ex-hint{font-size:11px;color:var(--tx3);margin-top:1px;font-weight:500}
.ex-sets-pill{
  padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;
  white-space:nowrap;flex-shrink:0;font-family:'JetBrains Mono',monospace;
}
.ex-prev{font-size:10px;font-weight:600;color:var(--orange);padding:0 16px 6px 56px}
.ex-body{display:none;padding:0 16px 14px}
.ex-body.open{display:block}

/* ─── SET LOGGING ─── */
.sg{display:grid;grid-template-columns:30px 1fr 1fr 36px;gap:6px;margin-bottom:5px;align-items:center}
.sg-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);padding-bottom:4px}
.sg-h:nth-child(2),.sg-h:nth-child(3){text-align:center}
.sg-n{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--tx3);text-align:center}
.sg-i{
  background:var(--bg);border:1.5px solid var(--bdr);border-radius:8px;
  color:var(--tx);padding:10px 8px;font-size:14px;font-weight:600;
  width:100%;text-align:center;font-family:'JetBrains Mono',monospace;
  transition:border-color .2s;
}
.sg-i:focus{outline:none;border-color:var(--blue)}
.sg-i::placeholder{color:var(--tx3);font-weight:400}
.sg-i.pr{border-color:var(--gold);box-shadow:0 0 12px rgba(251,191,36,.15)}
.sg-c{
  width:34px;height:34px;border-radius:8px;border:2px solid var(--bdr);
  background:transparent;color:transparent;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.sg-c.on{border:none;color:#fff}
.add-s{
  width:100%;padding:8px;border:1.5px dashed var(--bdr);border-radius:8px;
  background:transparent;color:var(--tx3);font-size:11px;font-weight:600;
  cursor:pointer;margin-top:4px;
}
.add-s:active{border-color:var(--tx2);color:var(--tx2)}
.note-i{
  width:100%;margin-top:8px;background:var(--bg);border:1.5px solid var(--bdr);
  border-radius:8px;color:var(--tx);padding:8px 10px;font-size:12px;
  resize:none;min-height:34px;max-height:80px;font-weight:500;
}
.note-i:focus{outline:none;border-color:var(--blue)}
.note-i::placeholder{color:var(--tx3)}

/* ─── TIMER ─── */
.timer-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(6,6,8,.96);backdrop-filter:blur(20px);
  border-top:1px solid var(--bdr);display:none;
  max-width:430px;margin:0 auto;
  padding:14px 20px max(14px,env(safe-area-inset-bottom));
}
.timer-bar.on{display:flex;align-items:center;gap:14px}
.t-time{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;min-width:80px}
.t-label{font-size:11px;color:var(--tx2);font-weight:500}
.t-btns{display:flex;gap:6px;margin-left:auto}
.t-btn{padding:8px 14px;border-radius:10px;border:none;font-weight:700;font-size:12px;cursor:pointer}

/* ─── PR TOAST ─── */
.pr-toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;
  padding:10px 22px;border-radius:14px;font-weight:800;font-size:14px;
  z-index:300;opacity:0;transition:all .4s;pointer-events:none;
  box-shadow:0 8px 30px rgba(251,191,36,.35);white-space:nowrap;
}
.pr-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── FOOTER ─── */
.foot{text-align:center;font-size:11px;color:var(--tx3);margin-top:24px;line-height:1.6;padding:0 10px}
.rst-btn{
  display:block;margin:14px auto 0;padding:8px 20px;border:1px solid var(--bdr);
  border-radius:8px;background:transparent;color:var(--tx3);font-size:11px;
  cursor:pointer;font-weight:600;transition:all .2s;
}
.rst-btn:hover{border-color:var(--red);color:var(--red)}

/* ─── ANIM ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tile{animation:fadeUp .35s ease both}
.tile:nth-child(2){animation-delay:.05s}
.tile:nth-child(3){animation-delay:.1s}
.tile:nth-child(4){animation-delay:.15s}
.tile:nth-child(5){animation-delay:.2s}
.ex-card{animation:fadeUp .25s ease both}
.ex-card:nth-child(n+2){animation-delay:calc((var(--i,0)) * 0.03s)}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:400}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="pr-toast" class="pr-toast"></div>
<div id="timer-bar" class="timer-bar">
  <div><div class="t-time" id="t-time">1:30</div><div class="t-label">Rest Timer</div></div>
  <div class="t-btns">
    <button class="t-btn" style="background:var(--card2);color:var(--tx)" onclick="adjTimer(-15)">−15s</button>
    <button class="t-btn" style="background:var(--card2);color:var(--tx)" onclick="adjTimer(15)">+15s</button>
    <button class="t-btn" style="background:var(--red);color:#fff" onclick="stopTimer()">Done</button>
  </div>
</div>
<div id="app"></div>

let S = {
  phase:1, view:'home', di:0,
  date:new Date().toISOString().split('T')[0],
  expanded:{}
};

/* ═══ DB ═══ */
const DB_KEY = 'jerai_v3';
function db(){ try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch(e){return{}} }
function sDb(d){ try{localStorage.setItem(DB_KEY,JSON.stringify(d))}catch(e){} }
function mk(p,di,ei){ return `${p}_${di}_${ei}` }
function lk(dt,p,di,ei){ return `${dt}|${mk(p,di,ei)}` }
function getL(dt,p,di,ei){ return db()[lk(dt,p,di,ei)]||null }
function setL(dt,p,di,ei,v){ const d=db();d[lk(dt,p,di,ei)]=v;sDb(d) }

function lastLog(p,di,ei,before){
  const d=db(),suf='|'+mk(p,di,ei);let b=null,bd='';
  for(const k in d){if(k.endsWith(suf)){const dt=k.split('|')[0];if(dt<before&&dt>bd){bd=dt;b=d[k]}}}
  return b;
}
function getPR(p,di,ei){
  const d=db(),suf='|'+mk(p,di,ei);let m=0;
  for(const k in d){if(k.endsWith(suf)&&d[k].sets){d[k].sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>m)m=w})}}
  return m;
}
function getPRBefore(p,di,ei,date){
  const d=db(),suf='|'+mk(p,di,ei);let m=0;
  for(const k in d){if(k.endsWith(suf)){const dt=k.split('|')[0];if(dt<date&&d[k].sets){d[k].sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>m)m=w})}}}
  return m;
}

function days(){ return DAYS[S.phase] }
function curDay(){ return days()[S.di] }
function isDone(dt,p,di,ei){ const l=getL(dt,p,di,ei);return l&&l.done }
function dayProgress(dt,p,di){ const d=days()[di];if(!d)return 0;return d.exercises.filter((_,i)=>isDone(dt,p,di,i)).length }
function dayTotal(di){ return days()[di]?days()[di].exercises.length:0 }
function dayComplete(dt,p,di){ return dayProgress(dt,p,di)===dayTotal(di)&&dayTotal(di)>0 }

function ensureSets(ei,n){
  let l=getL(S.date,S.phase,S.di,ei)||{sets:[],comment:'',done:false};
  while(l.sets.length<n) l.sets.push({weight:'',reps:'',done:false});
  const prev=lastLog(S.phase,S.di,ei,S.date);
  if(prev&&prev.sets){
    l.sets.forEach((s,i)=>{
      if(!s.weight&&!s.reps&&prev.sets[i]){s.weight=prev.sets[i].weight||'';s.reps=prev.sets[i].reps||''}
    });
  }
  setL(S.date,S.phase,S.di,ei,l);return l;
}

/* ═══ ACTIONS ═══ */
function openDay(i){S.di=i;S.view='workout';S.expanded={};render()}
function goHome(){S.view='home';render()}
function toggleDone(ei){
  const l=getL(S.date,S.phase,S.di,ei)||{sets:[],comment:'',done:false};
  l.done=!l.done;setL(S.date,S.phase,S.di,ei,l);
  if(l.done&&dayProgress(S.date,S.phase,S.di)===curDay().exercises.length) confetti();
  render();
}
function toggleEx(ei){const ek=mk(S.phase,S.di,ei);S.expanded[ek]=!S.expanded[ek];render()}
function updSet(ei,si,f,v){
  const l=getL(S.date,S.phase,S.di,ei);if(!l)return;
  l.sets[si][f]=v;setL(S.date,S.phase,S.di,ei,l);
  if(f==='weight'){const w=parseFloat(v)||0,old=getPRBefore(S.phase,S.di,ei,S.date);if(w>0&&w>old)showPR(curDay().exercises[ei].name,w)}
}
function toggleSetDone(ei,si){
  const l=getL(S.date,S.phase,S.di,ei);if(!l)return;
  l.sets[si].done=!l.sets[si].done;setL(S.date,S.phase,S.di,ei,l);
  if(l.sets[si].done)startTimer();render();
}
function addSet(ei){
  const l=getL(S.date,S.phase,S.di,ei);if(!l)return;
  l.sets.push({weight:'',reps:'',done:false});setL(S.date,S.phase,S.di,ei,l);render();
}
function updComment(ei,v){
  const l=getL(S.date,S.phase,S.di,ei)||{sets:[],comment:'',done:false};
  l.comment=v;setL(S.date,S.phase,S.di,ei,l);
}
function shiftDate(n){const d=new Date(S.date+'T12:00:00');d.setDate(d.getDate()+n);S.date=d.toISOString().split('T')[0];render()}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}

/* ═══ TIMER ═══ */
let tInt=null,tSec=90;
function startTimer(){
  tSec=90;clearInterval(tInt);
  document.getElementById('timer-bar').classList.add('on');
  tInt=setInterval(()=>{tSec--;if(tSec<=0){stopTimer();return}updTimer()},1000);
  updTimer();
}
function stopTimer(){clearInterval(tInt);document.getElementById('timer-bar').classList.remove('on')}
function adjTimer(s){tSec=Math.max(5,tSec+s);updTimer()}
function updTimer(){const m=Math.floor(tSec/60),s=tSec%60;document.getElementById('t-time').textContent=`${m}:${String(s).padStart(2,'0')}`}

/* ═══ PR ═══ */
function showPR(name,w){
  const el=document.getElementById('pr-toast');
  el.textContent=`🏆 NEW PR! ${name} — ${w}kg`;
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);
}

/* ═══ CONFETTI ═══ */
function confetti(){
  const c=document.getElementById('confetti'),x=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ps=[];const cols=['#ff3b5c','#00d47e','#4488ff','#ff8833','#a855f7','#fbbf24'];
  for(let i=0;i<80;i++) ps.push({x:c.width/2,y:c.height/2,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-5,sz:Math.random()*6+3,c:cols[~~(Math.random()*cols.length)],l:1});
  (function go(){x.clearRect(0,0,c.width,c.height);let a=false;ps.forEach(p=>{if(p.l<=0)return;a=true;p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.l-=.015;x.globalAlpha=p.l;x.fillStyle=p.c;x.fillRect(p.x,p.y,p.sz,p.sz)});x.globalAlpha=1;if(a)requestAnimationFrame(go);else x.clearRect(0,0,c.width,c.height)})();
}

/* ═══ HISTORY ═══ */
function getHist(p,di,ei){
  const d=db(),suf='|'+mk(p,di,ei),out=[];
  for(const k in d){if(k.endsWith(suf)){out.push({date:k.split('|')[0],...d[k]})}}
  out.sort((a,b)=>b.date.localeCompare(a.date));return out.slice(0,6);
}

/* ═══ RENDER ═══ */
function render(){
  const el=document.getElementById('app');
  if(S.view==='home') el.innerHTML=renderHome();
  else el.innerHTML=renderWorkout();
}

function renderHome(){
  const ds=days();
  const today=new Date().toISOString().split('T')[0];
  let h='';

  // Header
  h+=`<div class="hdr">
    <div class="hdr-title">JERAI <span>training</span></div>
    <div class="hdr-phase">
      <button class="ph-btn${S.phase===1?' on':''}" onclick="S.phase=1;render()">Phase 1</button>
      <button class="ph-btn${S.phase===2?' on':''}" onclick="S.phase=2;render()">Phase 2</button>
    </div>
  </div>`;

  // Greeting
  const hr=new Date().getHours();
  const gr=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const todayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
  h+=`<div class="greet"><div class="greet-hi">${gr}</div><div class="greet-msg">It's ${todayName}. Pick your workout.</div></div>`;

  // Tiles
  h+='<div class="tiles">';
  ds.forEach((d,i)=>{
    const prog=dayProgress(S.date,S.phase,i);
    const tot=d.exercises.length;
    const pct=Math.round((prog/tot)*100);
    const done=dayComplete(S.date,S.phase,i);

    h+=`<div class="tile" onclick="openDay(${i})" style="border-color:${done?d.color+'55':'var(--bdr)'}">
      <div class="tile-top">
        <div class="tile-icon" style="background:${d.color}18;color:${d.color};font-size:26px">${d.emoji}</div>
        <div class="tile-info">
          <div class="tile-day" style="color:${d.color}">${d.day}</div>
          <div class="tile-name">${d.title}</div>
          <div class="tile-muscles">${d.primary.join(' · ')}</div>
        </div>
        <div class="tile-arrow">›</div>
      </div>
      <div class="tile-done-bar" style="width:${pct}%;background:${d.color}"></div>
      <div class="tile-badge${done?' show':''}" style="background:${d.color}22;color:${d.color}">✓ Done</div>
    </div>`;
  });
  h+='</div>';

  h+='<div class="foot">Thu & Sun = Rest days · Drink water · Protein within 60 min</div>';
  h+=`<button class="rst-btn" onclick="if(confirm('Delete ALL data?')){localStorage.removeItem('${DB_KEY}');render()}">Reset All Data</button>`;
  return h;
}

function renderWorkout(){
  const d=curDay();
  const prog=dayProgress(S.date,S.phase,S.di);
  const tot=d.exercises.length;
  let h='';

  // Back
  h+=`<button class="back-btn" onclick="goHome()">← Back to days</button>`;

  // Muscle card
  h+=`<div class="muscle-card" style="border:1.5px solid ${d.color}33">`;
  h+=`<div class="muscle-card-head"><div class="mc-left">
    <div class="mc-day" style="color:${d.color}">${d.day} — Phase ${S.phase}</div>
    <div class="mc-title">${d.title}</div>
    <div class="mc-sub">${d.sub} · ${prog}/${tot} done</div>
  </div></div>`;

  // Body diagrams
  h+=`<div class="mc-body-wrap">${bodySVG(true,d.frontMuscles,d.color)}${bodySVG(false,d.backMuscles,d.color)}</div>`;

  // Muscle list
  h+=`<div class="muscle-list"><div class="muscle-col"><h4>Primary</h4><ul>`;
  d.primary.forEach(m=>{h+=`<li><span class="muscle-dot" style="background:${d.color}"></span>${m}</li>`});
  h+=`</ul></div><div class="muscle-col"><h4>Secondary</h4><ul>`;
  d.secondary.forEach(m=>{h+=`<li><span class="muscle-dot" style="background:${d.color}55"></span>${m}</li>`});
  h+=`</ul></div></div></div>`;

  // Date
  const isToday=S.date===new Date().toISOString().split('T')[0];
  h+=`<div class="date-bar">
    <button class="d-nav" onclick="shiftDate(-1)">‹</button>
    <input type="date" value="${S.date}" onchange="S.date=this.value;render()">
    <button class="d-nav" onclick="shiftDate(1)">›</button>
    <div class="d-label">${isToday?'Today':fmtD(S.date)}</div>
  </div>`;

  // Exercises
  d.exercises.forEach((ex,ei)=>{
    const done=isDone(S.date,S.phase,S.di,ei);
    const ek=mk(S.phase,S.di,ei);
    const open=S.expanded[ek];
    const log=ensureSets(ei,ex.n);
    const prev=lastLog(S.phase,S.di,ei,S.date);
    const pr=getPR(S.phase,S.di,ei);

    h+=`<div class="ex-card${done?' done':''}${open?' open':''}" style="--i:${ei}">`;

    // Header row
    h+=`<div class="ex-head" onclick="toggleEx(${ei})">`;
    h+=`<div class="ex-num" style="background:${done?d.color:d.color+'18'};color:${done?'#fff':d.color}">${done?'✓':(ei+1)}</div>`;
    h+=`<div class="ex-mid"><div class="ex-name">${ex.name}</div><div class="ex-hint">${ex.hint}</div></div>`;
    h+=`<div class="ex-sets-pill" style="background:${d.color}12;color:${d.color}">${ex.sets}</div>`;
    h+=`</div>`;

    // Prev
    if(prev&&prev.sets&&prev.sets.length){
      const ws=prev.sets.filter(s=>s.weight).map(s=>`${s.weight}×${s.reps||'?'}`);
      if(ws.length) h+=`<div class="ex-prev">↩ Last: ${ws.join(' · ')}${pr>0?' · 🏆'+pr+'kg':''}</div>`;
    }

    // Expand
    h+=`<div class="ex-body${open?' open':''}">`;
    h+=`<div class="sg"><div class="sg-h">Set</div><div class="sg-h">Kg</div><div class="sg-h">Reps</div><div class="sg-h"></div></div>`;
    log.sets.forEach((s,si)=>{
      const w=parseFloat(s.weight)||0;
      const isPR=w>0&&w>=pr&&pr>0;
      h+=`<div class="sg">
        <div class="sg-n">${si+1}</div>
        <input class="sg-i${isPR?' pr':''}" type="number" inputmode="decimal" placeholder="kg" value="${s.weight}" onchange="updSet(${ei},${si},'weight',this.value)">
        <input class="sg-i" type="number" inputmode="numeric" placeholder="reps" value="${s.reps}" onchange="updSet(${ei},${si},'reps',this.value)">
        <button class="sg-c${s.done?' on':''}" style="${s.done?'background:'+d.color:''}" onclick="toggleSetDone(${ei},${si})">${s.done?'✓':''}</button>
      </div>`;
    });
    h+=`<button class="add-s" onclick="addSet(${ei})">＋ Add set</button>`;
    h+=`<textarea class="note-i" placeholder="Notes…" oninput="updComment(${ei},this.value)">${log.comment||''}</textarea>`;

    // Mark done button
    h+=`<div style="margin-top:10px;display:flex;gap:8px">
      <button style="flex:1;padding:10px;border-radius:10px;border:none;font-weight:700;font-size:12px;cursor:pointer;background:${done?'var(--card2)':d.color};color:${done?'var(--tx2)':'#fff'}" onclick="event.stopPropagation();toggleDone(${ei})">${done?'Undo ✓':'Mark Complete ✓'}</button>
      <button style="padding:10px 14px;border-radius:10px;border:1px solid var(--bdr);background:var(--card2);color:var(--tx2);font-weight:700;font-size:12px;cursor:pointer" onclick="startTimer()">⏱ Rest</button>
    </div>`;
    h+=`</div></div>`;
  });

  // History
  h+=`<div style="margin-top:16px"><button class="history-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▾ Hide History':'▸ Exercise History'">▸ Exercise History</button>`;
  h+=`<div class="hist-panel">`;
  let any=false;
  d.exercises.forEach((ex,ei)=>{
    const hist=getHist(S.phase,S.di,ei);
    if(hist.length){
      any=true;
      h+=`<div class="hist-card"><div class="hist-ex-name" style="color:${d.color}">${ex.name}</div>`;
      hist.forEach(e=>{
        const ss=e.sets.filter(s=>s.weight||s.reps).map(s=>`${s.weight||'?'}kg × ${s.reps||'?'}`).join(' · ');
        if(ss) h+=`<div class="hist-row"><div class="hist-date">${fmtD(e.date)}</div><div class="hist-sets">${ss}</div></div>`;
        if(e.comment) h+=`<div class="hist-note">"${e.comment}"</div>`;
      });
      h+='</div>';
    }
  });
  if(!any) h+='<div class="hist-empty">No history yet — start logging!</div>';
  h+='</div></div>';

  return h;
}

render();
</script>
</body>
</html>
