<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f8f8fc">
<meta name="application-name" content="JERAI">
<meta name="apple-mobile-web-app-title" content="JERAI">
<title>JERAI Training</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237c5cfc'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='108' fill='%23ffffff'/%3E%3Ctext x='256' y='380' font-family='Arial,sans-serif' font-weight='900' font-size='360' fill='url(%23g)' text-anchor='middle'%3EJ%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5fa;--white:#ffffff;--card:#ffffff;
  --bdr:#e8e8f0;--bdr2:#d8d8e5;
  --tx:#1a1a2e;--tx2:#6b6b85;--tx3:#9b9bb5;
  --accent:#7c5cfc;--accent2:#a855f7;--accentBg:#f0ecff;
  --red:#ef4466;--green:#22c55e;--blue:#3b82f6;--orange:#f97316;--purple:#a855f7;--gold:#eab308;
  --r:16px;--rs:12px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04);
  --shadow2:0 2px 12px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--tx);
  min-height:100dvh;max-width:430px;margin:0 auto;
  padding:0 16px;
  padding-top:max(16px,env(safe-area-inset-top));
  padding-bottom:max(100px,env(safe-area-inset-bottom));
  overflow-x:hidden;
}
button,input,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{display:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{display:none}

/* ─── HEADER ─── */
.hdr{padding:20px 0 6px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{font-size:24px;font-weight:900;letter-spacing:-1px;color:var(--accent)}
.hdr-brand span{color:var(--tx3);font-weight:500;font-size:13px;letter-spacing:0;margin-left:2px}
.hdr-right{display:flex;gap:4px}
.ph-btn{
  padding:7px 14px;border:1.5px solid var(--bdr);border-radius:10px;font-size:11px;
  font-weight:700;cursor:pointer;background:var(--white);color:var(--tx3);transition:all .2s;
}
.ph-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ─── HOME ─── */
.greet{padding:14px 0 18px}
.greet-hi{font-size:14px;color:var(--tx2);font-weight:500}
.greet-msg{font-size:20px;font-weight:800;margin-top:2px;color:var(--tx);line-height:1.3}

.tiles{display:flex;flex-direction:column;gap:10px}
.tile{
  background:var(--card);border-radius:var(--r);padding:18px 16px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  border:1.5px solid var(--bdr);box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;
}
.tile:active{transform:scale(0.98);box-shadow:none}
.tile-icon{
  width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.tile-info{flex:1;min-width:0}
.tile-day{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px}
.tile-name{font-size:17px;font-weight:800;margin-top:2px;color:var(--tx)}
.tile-muscles{font-size:11px;color:var(--tx2);margin-top:3px;font-weight:500}
.tile-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.tile-prog{font-size:11px;font-weight:700;color:var(--tx3)}
.tile-arrow{font-size:18px;color:var(--tx3)}
.tile-bar{position:absolute;bottom:0;left:0;height:3px;transition:width .3s;border-radius:0 2px 0 0}
.tile-check{
  display:none;position:absolute;top:12px;right:12px;
  width:22px;height:22px;border-radius:50%;
  font-size:11px;font-weight:700;color:#fff;
  align-items:center;justify-content:center;
}
.tile-check.show{display:flex}

/* ─── WORKOUT VIEW ─── */
.workout{display:none}
.workout.active{display:block}
.back-row{
  display:flex;align-items:center;gap:8px;padding:14px 0;
}
.back-btn{
  display:flex;align-items:center;gap:4px;
  background:none;border:none;color:var(--accent);
  font-size:14px;font-weight:600;cursor:pointer;padding:0;
}
.back-btn:active{opacity:.5}

/* ─── DATE BAR ─── */
.date-bar{
  display:flex;align-items:center;gap:6px;margin-bottom:14px;
}
.d-nav{
  width:34px;height:34px;border-radius:10px;border:1.5px solid var(--bdr);
  background:var(--white);color:var(--tx2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);
}
.d-nav:active{background:var(--bg)}
.date-bar input[type=date]{
  background:var(--white);border:1.5px solid var(--bdr);border-radius:10px;
  color:var(--tx);padding:8px 12px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);
}
.d-label{font-size:12px;color:var(--tx3);font-weight:600;margin-left:auto}

/* ─── MOTIVATIONAL ─── */
.moti{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:var(--rs);padding:14px 16px;margin-bottom:16px;
  color:#fff;display:flex;align-items:center;gap:10px;
}
.moti-icon{font-size:22px;flex-shrink:0}
.moti-text{font-size:13px;font-weight:700;line-height:1.4}
.moti-sub{font-size:11px;font-weight:500;opacity:.8;margin-top:2px}

/* ─── EXERCISE LIST ─── */
.ex-section-title{font-size:13px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.ex-card{
  background:var(--card);border-radius:var(--r);margin-bottom:8px;
  overflow:hidden;border:1.5px solid var(--bdr);
  box-shadow:var(--shadow);transition:all .2s;
}
.ex-card.done{opacity:.45}
.ex-card.open{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,92,252,0.1)}
.ex-head{display:flex;align-items:center;gap:12px;padding:14px 14px;cursor:pointer}
.ex-num{
  width:30px;height:30px;border-radius:10px;font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ex-mid{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:700;line-height:1.3;color:var(--tx)}
.ex-card.done .ex-name{text-decoration:line-through;color:var(--tx3)}
.ex-hint{font-size:11px;color:var(--tx3);margin-top:1px;font-weight:500}
.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ex-sets-pill{
  padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;
  white-space:nowrap;font-family:'JetBrains Mono',monospace;
}
.ex-chevron{font-size:14px;color:var(--tx3);transition:transform .2s}
.ex-card.open .ex-chevron{transform:rotate(90deg)}
.ex-prev{font-size:10px;font-weight:600;color:var(--orange);padding:0 14px 8px 56px}

/* ─── SET LOGGING ─── */
.ex-body{display:none;padding:0 14px 14px}
.ex-body.open{display:block}
.sg{display:grid;grid-template-columns:30px 1fr 1fr 36px;gap:6px;margin-bottom:5px;align-items:center}
.sg-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);padding-bottom:4px}
.sg-h:nth-child(2),.sg-h:nth-child(3){text-align:center}
.sg-n{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--tx3);text-align:center}
.sg-i{
  background:var(--bg);border:1.5px solid var(--bdr);border-radius:8px;
  color:var(--tx);padding:10px 8px;font-size:14px;font-weight:600;
  width:100%;text-align:center;font-family:'JetBrains Mono',monospace;
}
.sg-i:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.1)}
.sg-i::placeholder{color:var(--tx3);font-weight:400}
.sg-i.pr{border-color:var(--gold);background:#fffbe6;box-shadow:0 0 8px rgba(234,179,8,.15)}
.sg-c{
  width:34px;height:34px;border-radius:8px;border:2px solid var(--bdr);
  background:var(--white);color:transparent;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.sg-c.on{border:none;color:#fff}
.add-s{
  width:100%;padding:8px;border:1.5px dashed var(--bdr);border-radius:8px;
  background:transparent;color:var(--tx3);font-size:11px;font-weight:600;
  cursor:pointer;margin-top:4px;
}
.add-s:active{border-color:var(--accent);color:var(--accent)}
.ex-actions{display:flex;gap:8px;margin-top:10px}
.act-btn{
  flex:1;padding:10px;border-radius:10px;border:none;
  font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;
}
.act-btn:active{transform:scale(0.97)}
.note-i{
  width:100%;margin-top:8px;background:var(--bg);border:1.5px solid var(--bdr);
  border-radius:8px;color:var(--tx);padding:8px 10px;font-size:12px;
  resize:none;min-height:34px;max-height:80px;font-weight:500;
}
.note-i:focus{outline:none;border-color:var(--accent)}
.note-i::placeholder{color:var(--tx3)}

/* ─── MUSCLE CARD (bottom) ─── */
.muscle-card{
  background:var(--card);border-radius:var(--r);padding:20px;
  margin-top:20px;border:1.5px solid var(--bdr);box-shadow:var(--shadow);
}
.mc-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);margin-bottom:4px}
.mc-title{font-size:20px;font-weight:900;margin-bottom:2px}
.mc-sub{font-size:12px;color:var(--tx2);font-weight:500;margin-bottom:16px}
.mc-body-wrap{display:flex;justify-content:center;gap:4px;margin-bottom:16px}
.mc-body-wrap svg{width:100px;height:220px}
.mc-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.mc-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr)}
.mc-dot.on{background:var(--accent)}
.mc-divider{height:1px;background:var(--bdr);margin-bottom:14px}
.muscle-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:10px}
.muscle-cols{display:flex;gap:30px}
.muscle-col h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:8px}
.muscle-col li{list-style:none;font-size:13px;font-weight:600;line-height:2;display:flex;align-items:center;gap:8px;color:var(--tx)}
.muscle-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ─── TIMER ─── */
.timer-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--bdr);display:none;
  max-width:430px;margin:0 auto;
  padding:14px 20px max(14px,env(safe-area-inset-bottom));
}
.timer-bar.on{display:flex;align-items:center;gap:14px}
.t-time{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:var(--tx);min-width:80px}
.t-label{font-size:11px;color:var(--tx2);font-weight:500}
.t-btns{display:flex;gap:6px;margin-left:auto}
.t-btn{padding:8px 14px;border-radius:10px;border:none;font-weight:700;font-size:12px;cursor:pointer}

/* ─── PR TOAST ─── */
.pr-toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;
  padding:10px 22px;border-radius:14px;font-weight:800;font-size:14px;
  z-index:300;opacity:0;transition:all .4s;pointer-events:none;
  box-shadow:0 8px 30px rgba(251,191,36,.35);white-space:nowrap;
}
.pr-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── HISTORY ─── */
.hist-toggle{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:12px;border-radius:var(--rs);
  border:1.5px solid var(--bdr);background:var(--white);
  color:var(--tx2);font-size:13px;font-weight:700;
  cursor:pointer;margin-top:14px;box-shadow:var(--shadow);
}
.hist-toggle:active{background:var(--bg)}
.hist-panel{display:none;margin-top:10px}
.hist-panel.open{display:block}
.hist-card{background:var(--card);border-radius:var(--rs);padding:14px;margin-bottom:8px;border:1px solid var(--bdr)}
.hist-ex-name{font-size:13px;font-weight:700;margin-bottom:6px}
.hist-row{display:flex;gap:8px;margin-bottom:4px;align-items:baseline}
.hist-date{font-size:11px;color:var(--tx3);font-weight:600;min-width:50px;font-family:'JetBrains Mono',monospace}
.hist-sets{font-size:12px;color:var(--tx2);font-weight:500}
.hist-note{font-size:11px;color:var(--orange);font-style:italic;margin-top:2px}
.hist-empty{color:var(--tx3);font-size:13px;text-align:center;padding:24px 0}

/* ─── FOOTER ─── */
.foot{text-align:center;font-size:11px;color:var(--tx3);margin-top:24px;line-height:1.6;padding:0 10px}
.rst-btn{
  display:block;margin:14px auto 0;padding:8px 20px;border:1.5px solid var(--bdr);
  border-radius:8px;background:var(--white);color:var(--tx3);font-size:11px;
  cursor:pointer;font-weight:600;transition:all .2s;
}
.rst-btn:hover{border-color:var(--red);color:var(--red)}

/* ─── ANIM ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tile{animation:fadeUp .3s ease both}
.tile:nth-child(2){animation-delay:.04s}
.tile:nth-child(3){animation-delay:.08s}
.tile:nth-child(4){animation-delay:.12s}
.tile:nth-child(5){animation-delay:.16s}
.ex-card{animation:fadeUp .25s ease both}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:400}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="pr-toast" class="pr-toast"></div>
<div id="timer-bar" class="timer-bar">
  <div><div class="t-time" id="t-time">1:30</div><div class="t-label">Rest Timer</div></div>
  <div class="t-btns">
    <button class="t-btn" style="background:var(--bg);color:var(--tx)" onclick="adjTimer(-15)">−15s</button>
    <button class="t-btn" style="background:var(--bg);color:var(--tx)" onclick="adjTimer(15)">+15s</button>
    <button class="t-btn" style="background:var(--red);color:#fff" onclick="stopTimer()">Done</button>
  </div>
</div>
<div id="app"></div>

<script>
/* ═══ BODY SVG ═══ */
function bodySVG(front, muscles, color) {
  const base='#d5d5e0';
  const hi=color||'#7c5cfc';
  const regions={
    chest:{d:'M28,58 Q36,54 44,52 L48,52 Q56,54 64,58 L64,72 Q48,76 28,72Z',s:'f'},
    shoulders_f:{d:'M20,50 Q24,46 28,50 L28,60 Q24,58 20,56Z M64,50 Q68,46 72,50 L72,56 Q68,58 64,60Z',s:'f'},
    biceps:{d:'M16,62 Q14,72 16,82 L22,82 Q24,72 22,62Z M70,62 Q68,72 70,82 L76,82 Q78,72 76,62Z',s:'f'},
    triceps_f:{d:'M12,64 Q10,74 12,82 L16,82 Q18,74 16,64Z M76,64 Q74,74 76,82 L80,82 Q82,74 80,64Z',s:'f'},
    forearms_f:{d:'M14,84 Q12,94 14,104 L20,104 Q22,94 20,84Z M72,84 Q70,94 72,104 L78,104 Q80,94 78,84Z',s:'f'},
    abs:{d:'M34,74 L58,74 L58,108 Q46,112 34,108Z',s:'f'},
    obliques:{d:'M26,76 L34,74 L34,108 Q30,106 26,100Z M58,74 L66,76 L66,100 Q62,106 58,108Z',s:'f'},
    quads:{d:'M28,112 L40,110 L38,152 L24,152Z M52,110 L64,112 L68,152 L54,152Z',s:'f'},
    hip_flexors:{d:'M34,108 L40,110 L38,116 L32,114Z M52,110 L58,108 L60,114 L54,116Z',s:'f'},
    traps:{d:'M32,48 Q46,42 60,48 L56,56 Q46,52 36,56Z',s:'b'},
    lats:{d:'M24,60 L34,58 L34,80 Q28,84 22,80Z M58,58 L68,60 L70,80 Q64,84 58,80Z',s:'b'},
    rear_delts:{d:'M18,50 Q22,46 26,50 L26,60 Q22,58 18,56Z M66,50 Q70,46 74,50 L74,56 Q70,58 66,60Z',s:'b'},
    rhomboids:{d:'M34,56 L46,54 L46,68 L34,70Z M46,54 L58,56 L58,70 L46,68Z',s:'b'},
    triceps_b:{d:'M14,62 Q12,72 14,82 L20,82 Q22,72 20,62Z M72,62 Q70,72 72,82 L78,82 Q80,72 78,62Z',s:'b'},
    lower_back:{d:'M34,78 L58,78 L58,96 Q46,100 34,96Z',s:'b'},
    glutes:{d:'M26,98 L42,96 L42,118 L24,118Z M50,96 L66,98 L68,118 L50,118Z',s:'b'},
    hamstrings:{d:'M26,120 L40,118 L38,156 L22,156Z M52,118 L66,120 L70,156 L54,156Z',s:'b'},
    calves_b:{d:'M26,158 L38,156 L36,186 L28,186Z M54,156 L66,158 L64,186 L56,186Z',s:'b'},
  };
  const side=front?'f':'b';
  const outline='M46,10 Q56,10 58,18 Q60,26 58,34 Q56,38 54,42 L60,46 Q72,44 76,50 Q82,56 80,64 Q78,84 80,96 L82,106 Q78,108 74,106 Q70,96 68,86 Q64,80 66,74 L66,100 Q68,110 70,116 Q72,126 70,148 Q68,160 66,170 Q64,180 62,192 L52,192 Q50,180 48,168 L46,160 L44,168 Q42,180 40,192 L30,192 Q28,180 26,170 Q24,160 22,148 Q20,126 22,116 Q24,110 26,100 L26,74 Q28,80 24,86 Q22,96 18,106 Q14,108 10,106 L12,96 Q14,84 14,64 Q10,56 16,50 Q20,44 32,46 L38,42 Q36,38 34,34 Q32,26 34,18 Q36,10 46,10Z';
  let p=`<path d="${outline}" fill="${base}" stroke="#c0c0d0" stroke-width="0.6"/>`;
  p+=`<ellipse cx="46" cy="16" rx="10" ry="12" fill="${base}" stroke="#c0c0d0" stroke-width="0.6"/>`;
  muscles.forEach(m=>{const r=regions[m];if(r&&r.s===side)p+=`<path d="${r.d}" fill="${hi}" opacity="0.75"/>`});
  return `<svg viewBox="0 0 92 200" xmlns="http://www.w3.org/2000/svg">${p}</svg>`;
}

/* ═══ DATA ═══ */
const MOTIV=[
  {t:"Focus. Push. Grow.",s:"Every rep brings you closer."},
  {t:"Legs feed the wolf.",s:"Build the foundation."},
  {t:"Pull your weight.",s:"Earn that back width."},
  {t:"Arm day is earned.",s:"Now make it count."},
  {t:"Sweat is fat crying.",s:"Burn it all."}
];

const DAYS={
1:[
  {day:'Monday',short:'MON',title:'Upper Push',sub:'Shoulders · Chest · Triceps',color:'#7c5cfc',emoji:'💥',
   primary:['Chest','Shoulders','Triceps'],secondary:['Upper Chest','Front Delts','Serratus'],
   fm:['chest','shoulders_f','triceps_f'],bm:['rear_delts'],
   exercises:[
     {name:'Overhead Dumbbell Press',sets:'4 × 10',hint:'Control the negative',n:4},
     {name:'Incline Dumbbell Press (30°)',sets:'4 × 10',hint:'Upper chest focus',n:4},
     {name:'Lateral Raises',sets:'4 × 12-15',hint:'Light, slow, controlled',n:4},
     {name:'Cable Chest Fly',sets:'3 × 12',hint:'Squeeze at top',n:3},
     {name:'Tricep Rope Pushdown',sets:'3 × 12-15',hint:'Lock elbows',n:3},
     {name:'Overhead Tricep Extension',sets:'3 × 12',hint:'Stretch & control',n:3},
     {name:'Push-ups to Failure',sets:'2 sets',hint:'Finisher 🔥',n:2}
   ]},
  {day:'Tuesday',short:'TUE',title:'Lower Body',sub:'Legs · Glutes · Core',color:'#22c55e',emoji:'🦵',
   primary:['Quads','Glutes','Hamstrings'],secondary:['Core','Hip Flexors','Calves'],
   fm:['quads','abs','hip_flexors'],bm:['glutes','hamstrings','lower_back'],
   exercises:[
     {name:'Goblet / Barbell Squat',sets:'4 × 10',hint:'Full depth',n:4},
     {name:'Romanian Deadlift',sets:'4 × 10',hint:'Feel hamstring stretch',n:4},

/* ═══ STATE ═══ */
let S={phase:1,view:'home',di:0,date:new Date().toISOString().split('T')[0],expanded:{}};

/* ═══ DB ═══ */
const DK='jerai_v3';
function db(){try{return JSON.parse(localStorage.getItem(DK)||'{}')}catch(e){return{}}}
function sDb(d){try{localStorage.setItem(DK,JSON.stringify(d))}catch(e){}}
function mk(p,d,e){return`${p}_${d}_${e}`}
function lk(dt,p,d,e){return`${dt}|${mk(p,d,e)}`}
function getL(dt,p,d,e){return db()[lk(dt,p,d,e)]||null}
function setL(dt,p,d,e,v){const x=db();x[lk(dt,p,d,e)]=v;sDb(x)}
function lastLog(p,d,e,before){
  const x=db(),suf='|'+mk(p,d,e);let b=null,bd='';
  for(const k in x){if(k.endsWith(suf)){const dt=k.split('|')[0];if(dt<before&&dt>bd){bd=dt;b=x[k]}}}
  return b;
}
function getPR(p,d,e){
  const x=db(),suf='|'+mk(p,d,e);let m=0;
  for(const k in x){if(k.endsWith(suf)&&x[k].sets){x[k].sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>m)m=w})}}
  return m;
}
function getPRBefore(p,d,e,date){
  const x=db(),suf='|'+mk(p,d,e);let m=0;
  for(const k in x){if(k.endsWith(suf)){const dt=k.split('|')[0];if(dt<date&&x[k].sets)x[k].sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>m)m=w})}}
  return m;
}

function days(){return DAYS[S.phase]}
function curDay(){return days()[S.di]}
function isDone(dt,p,d,e){const l=getL(dt,p,d,e);return l&&l.done}
function dayProg(dt,p,d){const dy=days()[d];if(!dy)return 0;return dy.exercises.filter((_,i)=>isDone(dt,p,d,i)).length}
function dayTot(d){return days()[d]?days()[d].exercises.length:0}
function dayComp(dt,p,d){return dayProg(dt,p,d)===dayTot(d)&&dayTot(d)>0}

function ensureSets(ei,n){
  let l=getL(S.date,S.phase,S.di,ei)||{sets:[],comment:'',done:false};
  while(l.sets.length<n)l.sets.push({weight:'',reps:'',done:false});
  const prev=lastLog(S.phase,S.di,ei,S.date);
  if(prev&&prev.sets){l.sets.forEach((s,i)=>{if(!s.weight&&!s.reps&&prev.sets[i]){s.weight=prev.sets[i].weight||'';s.reps=prev.sets[i].reps||''}})}
  setL(S.date,S.phase,S.di,ei,l);return l;
}

/* ═══ ACTIONS ═══ */
function openDay(i){S.di=i;S.view='workout';S.expanded={};render();window.scrollTo(0,0)}
function goHome(){S.view='home';render();window.scrollTo(0,0)}
function toggleDone(ei){
  const l=getL(S.date,S.phase,S.di,ei)||{sets:[],comment:'',done:false};
  l.done=!l.done;setL(S.date,S.phase,S.di,ei,l);
  if(l.done&&dayProg(S.date,S.phase,S.di)===curDay().exercises.length)confetti();
  render();
}
function toggleEx(ei){const ek=mk(S.phase,S.di,ei);S.expanded[ek]=!S.expanded[ek];render()}
function updSet(ei,si,f,v){
  const l=getL(S.date,S.phase,S.di,ei);if(!l)return;
  l.sets[si][f]=v;setL(S.date,S.phase,S.di,ei,l);
  if(f==='weight'){const w=parseFloat(v)||0,old=getPRBefore(S.phase,S.di,ei,S.date);if(w>0&&w>old)showPR(curDay().exercises[ei].name,w)}
}
function toggleSetDone(ei,si){
  const l=getL(S.date,S.phase,S.di,ei);if(!l)return;
  l.sets[si].done=!l.sets[si].done;setL(S.date,S.phase,S.di,ei,l);
  if(l.sets[si].done)startTimer();render();
}
function addSet(ei){const l=getL(S.date,S.phase,S.di,ei);if(!l)return;l.sets.push({weight:'',reps:'',done:false});setL(S.date,S.phase,S.di,ei,l);render()}
function updComment(ei,v){const l=getL(S.date,S.phase,S.di,ei)||{sets:[],comment:'',done:false};l.comment=v;setL(S.date,S.phase,S.di,ei,l)}
function shiftDate(n){const d=new Date(S.date+'T12:00:00');d.setDate(d.getDate()+n);S.date=d.toISOString().split('T')[0];render()}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtShort(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}

/* ═══ TIMER ═══ */
let tInt=null,tSec=90;
function startTimer(){tSec=90;clearInterval(tInt);document.getElementById('timer-bar').classList.add('on');tInt=setInterval(()=>{tSec--;if(tSec<=0){stopTimer();return}updT()},1000);updT()}
function stopTimer(){clearInterval(tInt);document.getElementById('timer-bar').classList.remove('on')}
function adjTimer(s){tSec=Math.max(5,tSec+s);updT()}
function updT(){const m=Math.floor(tSec/60),s=tSec%60;document.getElementById('t-time').textContent=`${m}:${String(s).padStart(2,'0')}`}

function showPR(name,w){const el=document.getElementById('pr-toast');el.textContent=`🏆 NEW PR! ${name} — ${w}kg`;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}

function confetti(){
  const c=document.getElementById('confetti'),x=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ps=[];const cols=['#7c5cfc','#22c55e','#3b82f6','#f97316','#a855f7','#eab308'];
  for(let i=0;i<80;i++)ps.push({x:c.width/2,y:c.height/2,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-5,sz:Math.random()*6+3,c:cols[~~(Math.random()*cols.length)],l:1});
  (function go(){x.clearRect(0,0,c.width,c.height);let a=false;ps.forEach(p=>{if(p.l<=0)return;a=true;p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.l-=.015;x.globalAlpha=p.l;x.fillStyle=p.c;x.fillRect(p.x,p.y,p.sz,p.sz)});x.globalAlpha=1;if(a)requestAnimationFrame(go);else x.clearRect(0,0,c.width,c.height)})();
}

function getHist(p,d,e){
  const x=db(),suf='|'+mk(p,d,e),out=[];
  for(const k in x){if(k.endsWith(suf))out.push({date:k.split('|')[0],...x[k]})}
  out.sort((a,b)=>b.date.localeCompare(a.date));return out.slice(0,6);
}

/* ═══ RENDER ═══ */
function render(){document.getElementById('app').innerHTML=S.view==='home'?renderHome():renderWorkout()}

function renderHome(){
  const ds=days();
  const todayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
  const hr=new Date().getHours();
  const gr=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  let h='';

  h+=`<div class="hdr">
    <div class="hdr-brand">JERAI <span>training</span></div>
    <div class="hdr-right">
      <button class="ph-btn${S.phase===1?' on':''}" onclick="S.phase=1;render()">Phase 1</button>
      <button class="ph-btn${S.phase===2?' on':''}" onclick="S.phase=2;render()">Phase 2</button>
    </div>
  </div>`;

  h+=`<div class="greet"><div class="greet-hi">${gr}</div><div class="greet-msg">It's ${todayName}. Let's train.</div></div>`;

  h+='<div class="tiles">';
  ds.forEach((d,i)=>{
    const prog=dayProg(S.date,S.phase,i);
    const tot=d.exercises.length;
    const pct=Math.round((prog/tot)*100);
    const done=dayComp(S.date,S.phase,i);

    h+=`<div class="tile" onclick="openDay(${i})">
      <div class="tile-icon" style="background:${d.color}12">${d.emoji}</div>
      <div class="tile-info">
        <div class="tile-day" style="color:${d.color}">${d.day}</div>
        <div class="tile-name">${d.title}</div>
        <div class="tile-muscles">${d.primary.join(' · ')}</div>
      </div>
      <div class="tile-right">
        <div class="tile-prog" style="color:${prog?d.color:'var(--tx3)'}">${prog}/${tot}</div>
        <div class="tile-arrow">›</div>
      </div>
      <div class="tile-bar" style="width:${pct}%;background:${d.color}"></div>
      <div class="tile-check${done?' show':''}" style="background:${d.color}">✓</div>
    </div>`;
  });
  h+='</div>';

  h+='<div class="foot">Thu & Sun = Rest · Stay hydrated · Protein within 60 min</div>';
  h+=`<button class="rst-btn" onclick="if(confirm('Delete ALL data?')){localStorage.removeItem('${DK}');render()}">Reset All Data</button>`;
  return h;
}

function renderWorkout(){
  const d=curDay();
  const prog=dayProg(S.date,S.phase,S.di);
  const tot=d.exercises.length;
  let h='';

  h+=`<div class="back-row"><button class="back-btn" onclick="goHome()">‹ Back</button></div>`;

  // Date bar
  const isToday=S.date===new Date().toISOString().split('T')[0];
  h+=`<div class="date-bar">
    <button class="d-nav" onclick="shiftDate(-1)">‹</button>
    <input type="date" value="${S.date}" onchange="S.date=this.value;render()">
    <button class="d-nav" onclick="shiftDate(1)">›</button>
    <div class="d-label">${isToday?'Today':fmtShort(S.date)}</div>
  </div>`;

  // Motivational
  const m=MOTIV[S.di]||MOTIV[0];
  h+=`<div class="moti">
    <div class="moti-icon">${d.emoji}</div>
    <div><div class="moti-text">${m.t}</div><div class="moti-sub">${m.s}</div></div>
  </div>`;

  // Exercises (PRIORITY - on top)
  h+=`<div class="ex-section-title">${d.title} · ${prog}/${tot} complete</div>`;

  d.exercises.forEach((ex,ei)=>{
    const done=isDone(S.date,S.phase,S.di,ei);
    const ek=mk(S.phase,S.di,ei);
    const open=S.expanded[ek];
    const log=ensureSets(ei,ex.n);
    const prev=lastLog(S.phase,S.di,ei,S.date);
    const pr=getPR(S.phase,S.di,ei);

    h+=`<div class="ex-card${done?' done':''}${open?' open':''}" style="animation-delay:${ei*0.03}s">`;
    h+=`<div class="ex-head" onclick="toggleEx(${ei})">`;
    h+=`<div class="ex-num" style="background:${done?d.color:d.color+'15'};color:${done?'#fff':d.color}">${done?'✓':(ei+1)}</div>`;
    h+=`<div class="ex-mid"><div class="ex-name">${ex.name}</div><div class="ex-hint">${ex.hint}</div></div>`;
    h+=`<div class="ex-right"><div class="ex-sets-pill" style="background:${d.color}10;color:${d.color}">${ex.sets}</div><div class="ex-chevron">›</div></div>`;
    h+=`</div>`;

    if(prev&&prev.sets&&prev.sets.length){
      const ws=prev.sets.filter(s=>s.weight).map(s=>`${s.weight}×${s.reps||'?'}`);
      if(ws.length)h+=`<div class="ex-prev">↩ Last: ${ws.join(' · ')}${pr>0?' · 🏆'+pr+'kg':''}</div>`;
    }

    h+=`<div class="ex-body${open?' open':''}">`;
    h+=`<div class="sg"><div class="sg-h">Set</div><div class="sg-h">Kg</div><div class="sg-h">Reps</div><div class="sg-h"></div></div>`;
    log.sets.forEach((s,si)=>{
      const w=parseFloat(s.weight)||0;
      const isPR=w>0&&w>=pr&&pr>0;
      h+=`<div class="sg"><div class="sg-n">${si+1}</div>
        <input class="sg-i${isPR?' pr':''}" type="number" inputmode="decimal" placeholder="kg" value="${s.weight}" onchange="updSet(${ei},${si},'weight',this.value)">
        <input class="sg-i" type="number" inputmode="numeric" placeholder="reps" value="${s.reps}" onchange="updSet(${ei},${si},'reps',this.value)">
        <button class="sg-c${s.done?' on':''}" style="${s.done?'background:'+d.color:''}" onclick="toggleSetDone(${ei},${si})">${s.done?'✓':''}</button>
      </div>`;
    });
    h+=`<button class="add-s" onclick="addSet(${ei})">＋ Add set</button>`;
    h+=`<textarea class="note-i" placeholder="Notes…" oninput="updComment(${ei},this.value)">${log.comment||''}</textarea>`;
    h+=`<div class="ex-actions">
      <button class="act-btn" style="background:${done?'var(--bg)':d.color};color:${done?'var(--tx2)':'#fff'}" onclick="event.stopPropagation();toggleDone(${ei})">${done?'Undo':'Complete ✓'}</button>
      <button class="act-btn" style="background:var(--bg);color:var(--tx2)" onclick="startTimer()">⏱ Rest</button>
    </div>`;
    h+=`</div></div>`;
  });

  // Muscle card (BELOW exercises)
  h+=`<div class="muscle-card">`;
  h+=`<div class="mc-label" style="color:${d.color}">Muscle Focus</div>`;
  h+=`<div class="mc-title">${d.primary.join(' · ')}</div>`;
  h+=`<div class="mc-sub">${prog}/${tot} done</div>`;
  h+=`<div class="mc-body-wrap">${bodySVG(true,d.fm,d.color)}${bodySVG(false,d.bm,d.color)}</div>`;
  h+=`<div class="mc-dots"><div class="mc-dot on"></div><div class="mc-dot"></div></div>`;
  h+=`<div class="mc-divider"></div>`;
  h+=`<div class="muscle-section-title">Muscles Worked</div>`;
  h+=`<div class="muscle-cols"><div class="muscle-col"><h4>Primary</h4><ul>`;
  d.primary.forEach(m=>{h+=`<li><span class="muscle-dot" style="background:${d.color}"></span>${m}</li>`});
  h+=`</ul></div><div class="muscle-col"><h4>Secondary</h4><ul>`;
  d.secondary.forEach(m=>{h+=`<li><span class="muscle-dot" style="background:${d.color}55"></span>${m}</li>`});
  h+=`</ul></div></div></div>`;

  // History
  h+=`<button class="hist-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▾ Hide History':'▸ Exercise History'">▸ Exercise History</button>`;
  h+=`<div class="hist-panel">`;
  let any=false;
  d.exercises.forEach((ex,ei)=>{
    const hist=getHist(S.phase,S.di,ei);
    if(hist.length){any=true;h+=`<div class="hist-card"><div class="hist-ex-name" style="color:${d.color}">${ex.name}</div>`;
      hist.forEach(e=>{const ss=e.sets.filter(s=>s.weight||s.reps).map(s=>`${s.weight||'?'}kg × ${s.reps||'?'}`).join(' · ');
        if(ss)h+=`<div class="hist-row"><div class="hist-date">${fmtShort(e.date)}</div><div class="hist-sets">${ss}</div></div>`;
        if(e.comment)h+=`<div class="hist-note">"${e.comment}"</div>`});
      h+='</div>'}
  });
  if(!any)h+='<div class="hist-empty">No history yet — start logging!</div>';
  h+='</div>';

  return h;
}

render();
</script>
</body>
</html>
